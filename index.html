<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Kazus</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <main class="main-view">
    <div id="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>
  </main>

  <aside class="sidebar" id="sidebar">
    <h1 class="logo">Казус</h1>
    
    <div>
      <button class="btn-main" onclick="document.getElementById('upload').click()">Выбрать изображение</button>
      <input type="file" id="upload" accept="image/*" style="display:none">
    </div>

    <div>
      <button class="btn-main" id="reset-btn">Сброс</button>
    </div>

    <details open>
      <summary>Градационные преобразования</summary>
      <div class="group-content">
        <label class="control-row">
          <input type="checkbox" id="grayscale-active" data-filter="grayscale">
          <span class="label-text">Серость</span>
        </label>

        <label class="control-row">
          <input type="checkbox" id="negative-active" data-filter="negative">
          <span class="label-text">Негатив</span>
        </label>
        
        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="binarization-active" data-filter="binarization">
            <span class="label-text">Пороговое преобразование</span>
          </label>
          <input type="range" id="binarization-threshold" data-param="binarizationThreshold" min="1" max="255" value="128">
        </div>

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="powerlaw-active" data-filter="powerlaw">
            <span class="label-text">Степенное преобразование</span>
          </label>
          <input type="range" id="power-law" data-param="powerLaw" min="0.01" max="5.0" step="0.1" value="2.5">
        </div>

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="logtransform-active" data-filter="logtransform">
            <span class="label-text">Логарифмическое преобразование</span>
          </label>
          <input type="range" id="log-gain" data-param="logGain" min="1" max="5.0" step="0.1" value="2.5">
        </div>
      </div>
    </details>

    <details>
      <summary>Другие эффекты</summary>
      <div class="group-content">
        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="quantization-active" data-filter="quantization">
            <span class="label-text">Квантование цвета</span>
          </label>
          <input type="range" id="quant-steps" data-param="quantSteps" min="1" max="32" step="1" value="16">
        </div>

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="solarisation-active" data-filter="solarisation">
            <span class="label-text">Соляризация</span>
          </label>
          <input type="range" id="solar-threshold" data-param="solarThreshold" min="1" max="255" step="1" value="128">
        </div>

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="pixelate-active" data-filter="pixelate">
            <span class="label-text">Пикселизация</span>
          </label>
          <input type="range" id="pixel-size" data-param="pixelSize" min="1" max="24" step="1" value="4">
        </div>

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="huerotate-active" data-filter="huerotate">
            <span class="label-text">HUERotate</span>
          </label>
          <input type="range" id="hue-angle" data-param="hueAngle" min="1" max="180" step="1" value="90">
        </div>
      </div>
    </details>

    <details>
      <summary>Dithering</summary>
      <div class="group-content">
        <label class="control-row">
            <input type="checkbox" id="dithering-check" data-filter="dithering">
            <span class="label-text">Standart</span>
        </label>

        <label class="control-row">
            <input type="checkbox" id="floydsteinberg-check" data-filter="floydSteinberg">
            <span class="label-text">Floyd-Steinberg</span>
        </label>

        <div class="sub-controls">
          <label class="label-text">Масштаб паттерна (DPI)</label>
          <input type="range" data-param="ditherScale" min="1" max="8" step="1" value="1">
          
          <label class="label-text">Порог яркости</label>
          <input type="range" data-param="ditherThreshold" min="0" max="2" step="0.1" value="1">
          
          <label class="label-text">Линейный масштаб (Gamma)</label>
          <input type="range" data-param="ditherLinear" min="0.5" max="2.5" step="0.1" value="1">
      </div>
      </div>
    </details>

    <details>
      <summary>Шумы и искажения</summary>
      <div class="group-content">

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="saltpepper-active" data-filter="saltpepper">
            <span class="label-text">Соль и перец</span>
          </label>
          <input type="range" id="salt-pepper-prob" data-param="saltPepperProb" min="0" max="1" step="0.01" value="0.02">
        </div>

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="filmgrain-active" data-filter="filmgrain">
            <span class="label-text">Плёночное зерно</span>
          </label>
          <input type="range" id="grain-amount" data-param="grainAmount" min="0" max="50" step="1" value="15">
        </div>

        <div class="control-block">
          <label class="control-row">
            <input type="checkbox" id="scanlines-check" data-filter="scanlines">
            <span class="label-text">TV-эффект</span>
          </label>
        </div>
      </div>
    </details>
  </aside>
  <script src="script.js" type="module"></script>
</body>
</html>
